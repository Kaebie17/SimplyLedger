<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">

    <!-- For iOS (Safari doesn't fully use manifest yet) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="App">
        <!-- iOS PWA Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="./icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icon-192.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./icon-192.png">

    <!-- iOS Splash Screens -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SimplyLedger">
    <link rel="stylesheet" href="src/styles.css">
    <script id="tailwind" src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>

<body class="font-serif flex flex-col h-lvh overflow-hidden">
    <header id="header" class="box-border flex shrink-0 items-center w-screen h-12 px-2 bg-black/75">
        <div class="box-border size-fit flex"><img src="public/Designer.png" alt="logo" class="w-12 h-10 rounded-full"></div>
        <div class="flex flex-auto h-full"><span
                class="ping text-orange-500 tracking-widest font-black self-center">S</span><span
                class="ping text-orange-500 tracking-widest font-black self-center">i</span><span
                class="ping text-white tracking-widest font-black self-center">m</span><span
                class="ping text-white tracking-widest font-black self-center">p</span><span
                class="ping text-green-500 tracking-widest font-black self-center">l</span><span
                class="ping text-green-500 tracking-widest font-black self-center">y</span><span
                class="text-white tracking-widest font-black drop self-center">Ledger</span></h1>
        </div>
        <div class="w-auto self-start flex flex-col">
            <Select id="chooselang" class="pt-2 text-[0.5rem] tracking-widest text-white">
                <option value="Hindi" class="bg-black/75">Hindi</option>
                <option value="English" class="bg-black/75" selected>English</option>
            </Select>
        </div>

    </header>
    <hr class="h-1 bg-black" />
    <div class="grid grow-1">
        <section id="calendar" class="gridmembercss h-full">
            <div id="datesarea" class="grow-1 bg-linear-30 from-teal-200 to-yellow-300">
                <!-- fill dates using js -->
            </div>
            <hr class="h-1 bg-black" />
            <div id="dynamicsec" class="grid overflow-y-auto grow-1 hidden">
                <output id="output"
                    class="gridmembercss flex flex-col justify-center gap-2 h-full px-5 py-2 bg-teal-200 hidden">
                    <h1 id="outputtitle" class="text-center mb-4 text-xl font-black tracking-wider">Day's Status</h1>
                    <span id="outputincome" class="flex items-center">
                        <h2 class="w-12 flex-auto justify-between tracking-widest">Income (MTD)</h2>
                        <p id="incometoday" class="border-2 w-15 h-10 text-center"></p>
                    </span>
                    <span id="outputexpense" class="flex items-center mt-1">
                        <h2 class="w-12 flex-auto justify-between tracking-widest">Day's Expenses</h2>
                        <p id="expensetoday" class="border-2 w-15 h-10 text-center"></p>
                    </span>
                    <span id="outputbalance" class="flex items-center mt-1">
                        <h2 class="w-12 flex-auto justify-between tracking-widest">Balance</h2>
                        <p id="expensebalance" class="border-2 w-15 h-10 text-center"></p>
                    </span>
                    <input type="button" value="Refresh" id="balanceupdate"
                        class="bg-sky-500 shadow-lg shadow-blue-500 active:shadow-none box-border border-1 w-18 tracking-widest py-1 mt-1 self-center ">
                    <p name="swipedirection" class="text-[0.5rem] self-end h-15 content-end">swipe next</p>
                </output>
                <form action="" id="expenseform"
                    class="gridmembercss flex flex-col justify-center gap-2 h-full px-5 py-2 bg-pink-200 ">
                    <h1 id="costtitle" class="text-center mb-4 text-xl font-black tracking-wider">Expense Tracker</h1>
                    <span id="expensecost" class="flex items-center"><label for="cost"
                            class="w-12 flex-auto text-center tracking-widest">Total Cost</label><input id="cost"
                            type="number"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500"
                            required></span>
                    <span id="expensecategory" class="flex items-center mt-1"><label for="category"
                            class="w-17 flex-auto text-center tracking-widest">Category</label><input id="category"
                            type="text"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500 disabled:bg-gray-200/50 disabled:text-gray-500 disabled:shadow-none"
                            required><a id="costdetails" class="block text-[0.5rem] w-5 pl-1 flex-none">Add
                            Details</a></span>
                    <span id="expenseday" class="flex items-center mt-1"><label for="timestamp"
                            class="w-12 flex-auto text-center tracking-widest">Timestamp</label><input id="timestamp"
                            type="date"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500 disabled:bg-gray-200/50 disabled:text-gray-500 disabled:shadow-none"
                            required></span>
                    <span class="flex justify-center gap-3 mt-5">
                        <button id="expenseupdate"
                            class="bg-sky-500 shadow-lg shadow-blue-500 disabled:bg-sky-200 disabled:shadow-none active:shadow-none box-border border-1 w-18 tracking-widest py-1">Add</button>
                        <button id="expenseedit"
                            class="bg-sky-500 shadow-lg shadow-blue-500 disabled:bg-sky-200 disabled:shadow-none active:shadow-none box-border border-1 w-18 tracking-widest py-1"
                            disabled>Edit</button>
                        <a href="javascript:void(0);" class="text-sm italic self-end justify-self-end"
                            ontouchend="deleteEntry(db,categoryEl.value ? [timestampEl.value, categoryEl.value]: timestampEl.value,'expenseDB')">Delete</a>
                        <a href="javascript:void(0);" class="text-sm italic self-end justify-self-end"
                            ontouchend="reset()">Reset</a>
                    </span>
                    <p name="swipedirection" class="text-[0.5rem] self-end h-5 content-end">swipe next</p>
                </form>
                <form action="" id="incomeform"
                    class="gridmembercss flex flex-col justify-center gap-2 h-full px-5 py-2 hidden bg-fuchsia-300">
                    <h1 id="incometitle" class="text-center mb-4 text-xl font-black tracking-wider">Income Tracker</h1>
                    <span class="flex items-center"><label for="income"
                            class="w-12 flex-auto text-center tracking-widest">Income</label><input id="income"
                            type="number"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500"
                            required></span>
                    <span class="flex items-center mt-1"><label for="source"
                            class="w-17 flex-auto text-center tracking-widest">Source</label><input id="source"
                            type="text"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500"
                            required><a id="incomedetails" class="block text-[0.5rem] w-5 pl-1 flex-none">Add
                            Details</a></span>
                    <span class="flex items-center mt-1"><label for="entry"
                            class="w-12 flex-auto text-center tracking-widest">Timestamp</label><input
                            id="incometimestamp" type="date"
                            class="w-20 h-10 flex-auto p-2 border-1 border-gray-500/50 shadow-lg focus:border-blue-500 focus:outline focus:outline-blue-500 focus:invalid:border-pink-500 focus:invalid:outline-pink-500"
                            required></span>
                    <button id="incomeupdate"
                        class="bg-sky-500 shadow-lg shadow-blue-500 active:shadow-none box-border border-1 w-18 tracking-widest py-1 mt-1 self-center ">Add</button>
                    <p name="swipedirection" class="text-[0.5rem] self-end h-15 content-end">swipe next</p>
                </form>
            </div>
            <dialog id="detailsmodal" class="self-center justify-self-center h-min-10 w-full p-2">
                <span class="flex justify-center h-8 gap-1 mt-2">
                    <button id="newentrybtn"
                        class="w-20 h-8 shadow-md shadow-indigo-500/50 bg-indigo-200 active:bg-indigo-500 active:shadow-none text-md disabled:bg-sky-200 disabled:shadow-none">Add
                        New</button>
                    <button id="donebtn"
                        class="w-20 h-8 shadow-md shadow-indigo-500/50 bg-indigo-200 active:bg-indigo-500 active:shadow-none text-md disabled:bg-sky-200 disabled:shadow-none">Done</button>
                </span>
            </dialog>

        </section>
        <section id="plots" class="gridmembercss w-full bg-white overflow-y-auto hidden">
            <div class="grid bg-black/75"></div>
            <div class="grid bg-black/75"></div>
            <div class="grid bg-black/75"></div>
            <div class="grid bg-black/75"></div>
            <div class="grid bg-black/75"></div>
            <div id="controlzoom" class="w-full flex justify-center bg-black/75">
                <p id="collapse" data-value="-1"
                    class="mb-1 mr-2 box-border flex justify-center items-center size-5 border-1 text-white">+</p>
                <p id="expand" data-value="1"
                    class="mb-1 box-border flex justify-center items-center size-5 border-1 text-white">-</p>
            </div>
        </section>
        <section id="history" class="gridmembercss flex flex-col items-center w-full bg-white hidden">
            <div class="flex gap-1">
                <select id="chooseyear" class="box-border h-10 border-1">
                    <option value="" selected>Choose Year</option>
                </select>
                <search-box id="searchinput" class="border-b-1" placeholder="Enter Item, Category, or Sub-Category"
                    disabled></search-box>
                <!-- <input type="search" class="w-full h-10 border-b-1 border-bg-black active: outline-none p-1"> -->
            </div>
            <div id="historycontainer" class="grid place-content-center hidden">
                <div class="gridmembercss w-full h-[79vh] flex flex-col align-center overflow-y-auto"> </div>
                <p id="expensesum"
                    class="gridmembercss relative justify-self-center place-self-end w-20 h-20 border-1 rounded-full bg-black/75 text-white text-[1.5rem] content-center text-center"
                    draggable="true">Total</p>
            </div>
            <p class="h-full content-center text-[2rem]">No data found...</p>
        </section>
    </div>
    <footer id="footer" class="px-2 flex shrink-0 items-center justify-between w-screen h-10 bg-black/75">
        <div class="flex">
            <div id="showhistory"
                class="box-border w-6 h-6 p-1 border-2 border-gray-500 flex flex-col shadow-md shadow-black active:shadow-none">
                <hr class="mb-1 border-1 border-gray-500">
                <hr class="mb-1 border-1 border-gray-500">
                <hr class="border-1 border-gray-500">
            </div>
            <svg id="switchview" viewBox="0 0 100 100"
                class="box-border w-6 h-6 ml-1 border-2 border-gray-500 flex flex-col shadow-md shadow-black active:shadow-none">
                <path d="M 40 45 l -15 10 v 20 h 20 l 10 -15 l 5 -2.5 l 5 -5 l 30 -30 l -17.5 -20 l -30 30 l -5 5 z"
                    stroke-width="5" stroke="gray" fill="transparent"></path>
                <path d="M 17.5 82.5 h 5" stroke-width="5" stroke="black" fill="transparent"></path>
                <path d="M 10 90 h 80" stroke-width="5" stroke="gray" fill="transparent"></path>
            </svg>
            <svg id="showplots" viewBox="0 0 100 100"
                class="box-border w-6 h-6 mx-1 border-2 border-gray-500 flex flex-col shadow-md shadow-black active:shadow-none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M 5 25 h 15 l 15 15 l 15 -15 l 15 -15 l 15 15 h 15" stroke-width="5" stroke="gray"
                    fill="transparent"></path>
                <path d="M 5 50 h 15 l 15 15 l 15 -15 l 15 -15 l 15 15 h 15" stroke-width="5" stroke="gray"
                    fill="transparent"></path>
                <path d="M 5 75 h 15 l 15 15 l 15 -15 l 15 -15 l 15 15 h 15" stroke-width="5" stroke="gray"
                    fill="transparent"></path>
            </svg>
            <svg id="filedownload" viewBox="0 0 100 100"
                class="box-border w-6 h-6 border-2 border-gray-500 flex flex-col shadow-md shadow-black active:shadow-none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M 33 5 v 50 h -20 l 35 35 l 35 -35 h -20 v -50 z" stroke-width="5" stroke="gray"
                    fill="transparent"></path>
            </svg>
            <svg id="fileupload" viewBox="0 0 100 100"
                class="box-border w-6 h-6 mx-1 border-2 border-gray-500 flex flex-col shadow-md shadow-black active:shadow-none"
                xmlns="http://www.w3.org/2000/svg">
                <path d="M 33 95 v -50 h -20 l 35 -35 l 35 35 h -20 v 50 z" stroke-width="5" stroke="gray"
                    fill="transparent"></path>
            </svg>
            <div
                class="box-border w-6 h-6 border-2 border-gray-500 flex items-center shadow-md shadow-black active:shadow-none">
                <p class="text-[0.5rem] w-full text-center text-gray-400 font-black">T&C</p>
            </div>
        </div>
        <!-- <a href="" class="text-[0.5rem] tracking-widest text-white">Visualize</a>
        <a href="" class="text-[0.5rem] tracking-widest text-white">Extract</a> -->
        <p class="text-[0.5rem] text-white tracking-widest">©️SIMPLYLEDGER</p>
    </footer>
    <script type="module" src="src/svg.js"></script>
    <script type="module" src="src/customelement.js"></script>
    <script type="module" src="src/index.js"></script>

</body>

</html>
